# MoveIt 控制器管理配置
# - 指定控制器管理器类型为 MoveItSimpleControllerManager
# - 列出可用控制器并映射到具体接口与关节

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - hand_controller

  arm_controller:
    type: FollowJointTrajectory  # 机械臂使用轨迹 Action 接口
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    action_ns: follow_joint_trajectory
  hand_controller:
    type: FollowJointTrajectory
    joints:
      - hand_right_joint
    action_ns: follow_joint_trajectory
    default: true
